name: profitalerts
description: Stock news alert portal — real-time AI sentiment for your watchlist.
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Fonts
  google_fonts: ^6.2.1

  # Storage
  shared_preferences: ^2.3.2

  # HTTP client for real API integration
  dio: ^5.7.0

  # URL launcher
  url_launcher: ^6.3.1

  # i18n
  intl: ^0.20.0

  # Financial charts (TradingView-style)
  fl_chart: ^0.68.0

  # Micro-animations
  flutter_animate: ^4.5.0

  # Firebase + Auth
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^18.0.0
  firebase_auth: ^5.0.0
  google_sign_in: ^6.2.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/Black.png"
  adaptive_icon_background: "assets/icons/Black.png"
  adaptive_icon_foreground: "assets/icons/Black.png"
  android_icon_monochrome: "assets/icons/Light.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icons/Black.png"
